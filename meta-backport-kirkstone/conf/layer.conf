# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-backport-kirkstone"
BBFILE_PATTERN_meta-backport-kirkstone = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-backport-kirkstone = "20"

LAYERDEPENDS_meta-backport-kirkstone = "core rauc"
LAYERSERIES_COMPAT_meta-backport-kirkstone = "kirkstone"
