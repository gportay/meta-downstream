header:
  version: 2
local_conf_header:
  machine-raspberrypi-use-initramfs-image-bundle: |
    RPI_EXTRA_IMAGE_BOOT_FILES:remove = "${KERNEL_IMAGETYPE};${SDIMG_KERNELIMAGE}"
    RPI_EXTRA_IMAGE_BOOT_FILES:append = " ${KERNEL_IMAGETYPE}-${INITRAMFS_LINK_NAME}.bin;${SDIMG_KERNELIMAGE}"
