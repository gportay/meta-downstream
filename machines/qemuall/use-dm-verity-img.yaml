header:
  version: 2
local_conf_header:
  machine-qemux86-64-use-dm-verity-img: |
    MACHINE_FEATURES += "efi"
    IMAGE_INSTALL:append = " intel-microcode"
    EFI_PROVIDER = "systemd-boot"
    APPEND:append = " console=ttyS0,115200"
